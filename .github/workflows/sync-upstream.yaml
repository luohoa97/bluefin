name: Sync upstream
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/ublue-os/bluefin.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit || true

      - name: Detect Fedora beta version
        id: fedora
        run: |
          BETA_VERSION=$(python3 -c "
          import urllib.request, json
          with urllib.request.urlopen('https://bodhi.fedoraproject.org/releases/?rows_per_page=20&state=current') as r:
              data = json.load(r)
          stable = max(
              int(r['version']) for r in data['releases']
              if r['id_prefix'] == 'FEDORA' and r['version'].isdigit()
          )
          print(stable + 1)
          ")
          echo "version=$BETA_VERSION" >> $GITHUB_OUTPUT
          echo "Detected Fedora beta: $BETA_VERSION"

      - name: Enforce beta tag in image-versions.yml
        run: |
          VERSION=${{ steps.fedora.outputs.version }}
          sed -i "s/tag: .*/tag: $VERSION/g" image-versions.yml
          git add image-versions.yml
          git diff --cached --quiet || git commit -m "chore: track Fedora $VERSION beta"
          git push origin main
